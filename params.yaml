data:
  raw_path: data/raw/creditcard.csv
  processed_dir: data/processed
  target_column: Class

preprocessing:
  remove_duplicates: true
  scale_columns:
    - Time
    - Amount
  test_size: 0.20
  validation_size: 0.20
  random_state: 42

model:
  type: logistic_regression
  random_state: 42
  max_iter: 1000
  class_weight: balanced
  experiments:
    - name: logistic_regression_baseline
      C: 1.0
      solver: lbfgs

    - name: logistic_regression_c_0_1
      C: 0.1
      solver: lbfgs

    - name: logistic_regression_c_10
      C: 10.0
      solver: lbfgs

paths:
  model_dir: models
  model_name: fraud_model.pkl